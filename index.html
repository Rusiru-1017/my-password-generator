<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Security Generator</title>
    <style>
        body { margin: 0; background: #050505; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
        
        /* Planets/Space */
        .planet { position: absolute; border-radius: 50%; background: radial-gradient(circle, #5c5c5c, #000); animation: orbit 20s linear infinite; }
        .p1 { width: 50px; height: 50px; background: #4a90e2; top: 20%; left: 10%; }
        .p2 { width: 30px; height: 30px; background: #e74c3c; bottom: 20%; right: 15%; }
        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .box { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; text-align: center; width: 350px; border: 1px solid rgba(255,255,255,0.1); z-index: 10; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 100%; padding: 10px; background: #f1c40f; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="planet p1"></div>
    <div class="planet p2"></div>

    <div class="box">
        <h2>Space Security Key</h2>
        <input type="text" id="name" placeholder="Enter your name">
        <input type="text" id="bday" placeholder="Enter birth year (e.g., 1999)">
        <button onclick="generateSecurePassword()">Generate Secure Key</button>
        <h3 id="passDisplay" style="margin-top: 20px; color: #f1c40f;"></h3>
    </div>

    <script>
        function generateSecurePassword() {
            const name = document.getElementById('name').value.substring(0, 3).toUpperCase();
            const bday = document.getElementById('bday').value.substring(2);
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%";
            let password = name + "-" + bday + "-";
            
            for(let i = 0; i < 8; i++) {
                password += chars[Math.floor(Math.random() * chars.length)];
            }
            document.getElementById('passDisplay').innerText = password;
        }
    </script>
</body>
</html>
