<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Galactic Security Key Generator - Create deterministic security keys with beautiful animations">
  <meta name="keywords" content="password generator, security key, hash generator, animated UI">
  <meta name="author" content="Rusiru-1017">
  <title>Galactic Security Key Generator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4b 50%, #0d1235 100%);
      position: relative;
    }

    .container {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }

    /* Animated Space Background */
    .space-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: 
        radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
      overflow: hidden;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      z-index: 1;
    }

    /* Nebula Effects */
    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: nebulaFloat 20s ease-in-out infinite;
      z-index: 0;
    }

    .nebula-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(138,43,226,0.4) 0%, rgba(75,0,130,0) 70%);
      top: -200px;
      right: -100px;
      animation-delay: 0s;
    }

    .nebula-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,191,255,0.3) 0%, rgba(0,0,139,0) 70%);
      bottom: -150px;
      left: -100px;
      animation-delay: -5s;
    }

    .nebula-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,20,147,0.3) 0%, rgba(139,0,139,0) 70%);
      top: 50%;
      left: 50%;
      animation-delay: -10s;
    }

    @keyframes nebulaFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Floating Astronaut */
    .astronaut-container {
      position: absolute;
      left: 5%;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      animation: floatAstronaut 8s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(100, 200, 255, 0.5));
    }

    @keyframes floatAstronaut {
      0%, 100% { 
        transform: translateY(-50%) translateX(0) rotate(-5deg); 
      }
      25% { 
        transform: translateY(-60%) translateX(20px) rotate(5deg); 
      }
      50% { 
        transform: translateY(-45%) translateX(10px) rotate(-3deg); 
      }
      75% { 
        transform: translateY(-55%) translateX(-10px) rotate(3deg); 
      }
    }

    .astronaut {
      width: 150px;
      height: 180px;
      animation: astronautBob 3s ease-in-out infinite;
    }

    @keyframes astronautBob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    /* Content Card */
    .content {
      position: relative;
      z-index: 20;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 50px 40px;
      max-width: 550px;
      width: 100%;
      box-shadow: 
        0 25px 50px rgba(0, 0, 0, 0.5),
        0 0 100px rgba(100, 200, 255, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideUp 1s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .title {
      text-align: center;
      color: #fff;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(100, 200, 255, 0.8);
      letter-spacing: 2px;
      background: linear-gradient(135deg, #64c8ff 0%, #a8d5ff 50%, #64c8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titleGlow 3s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 25px;
      position: relative;
    }

    label {
      display: block;
      color: #a8d5ff;
      font-size: 13px;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid rgba(100, 200, 255, 0.2);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    input:hover {
      border-color: rgba(100, 200, 255, 0.4);
      background: rgba(0, 0, 0, 0.4);
    }

    input:focus {
      outline: none;
      border-color: rgba(100, 200, 255, 0.8);
      box-shadow: 
        0 0 20px rgba(100, 200, 255, 0.3),
        inset 0 0 10px rgba(100, 200, 255, 0.1);
      background: rgba(0, 0, 0, 0.5);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 30px;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .button:hover::before {
      left: 100%;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }

    .button:active {
      transform: translateY(-1px);
    }

    .result-section {
      margin-top: 35px;
      padding: 30px;
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(100, 255, 100, 0.3);
      border-radius: 16px;
      animation: slideUp 0.6s ease-out;
      box-shadow: 0 0 30px rgba(100, 255, 100, 0.2);
    }

    .result-label {
      color: #64ff64;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 15px;
      font-weight: 700;
      text-align: center;
    }

    .security-key {
      background: rgba(0, 20, 0, 0.6);
      border: 2px solid rgba(100, 255, 100, 0.4);
      padding: 20px;
      border-radius: 12px;
      color: #64ff64;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      word-break: break-all;
      text-align: center;
      font-weight: bold;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 0 20px rgba(100, 255, 100, 0.3),
        inset 0 0 20px rgba(100, 255, 100, 0.1);
      letter-spacing: 2px;
      user-select: all;
      text-shadow: 0 0 10px rgba(100, 255, 100, 0.5);
    }

    .copy-btn {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: rgba(100, 255, 100, 0.1);
      border: 2px solid rgba(100, 255, 100, 0.3);
      color: #64ff64;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .copy-btn:hover {
      background: rgba(100, 255, 100, 0.2);
      border-color: rgba(100, 255, 100, 0.6);
      box-shadow: 0 0 20px rgba(100, 255, 100, 0.3);
      transform: translateY(-2px);
    }

    .copy-btn:active {
      transform: scale(0.98);
    }

    /* Shooting Stars */
    .shooting-star {
      position: absolute;
      width: 100px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,1), transparent);
      animation: shoot 3s linear infinite;
      opacity: 0;
      z-index: 1;
    }

    @keyframes shoot {
      0% {
        transform: translateX(0) translateY(0) rotate(-45deg);
        opacity: 1;
      }
      100% {
        transform: translateX(500px) translateY(500px) rotate(-45deg);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .content {
        padding: 40px 25px;
        margin: 10px;
      }

      .title {
        font-size: 26px;
      }

      .astronaut-container {
        left: 2%;
        width: 100px;
      }

      .astronaut {
        width: 100px;
        height: 120px;
      }
    }

    /* Loading Animation */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <canvas id="spaceCanvas"></canvas>
</div>
