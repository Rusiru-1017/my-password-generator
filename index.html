<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Security Key</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stars"></div>
    <div class="spaceman"></div>

    <div class="box">
        <h2>Galactic Security Key</h2>
        <input type="text" id="name" placeholder="Enter your name">
        <input type="number" id="bday" placeholder="Enter birth year (e.g., 1999)">
        <button onclick="generateSecurePassword()">Generate Secure Key</button>
        <div id="passDisplay"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
