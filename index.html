<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galactic Key Generator</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            /* Galaxy Gradient Background */
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        /* Twinkling Stars Animation */
        .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle 2s infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .box { 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(20px); 
            padding: 40px; border-radius: 25px; 
            text-align: center; width: 350px; 
            border: 1px solid rgba(255,255,255,0.1); 
            z-index: 10; box-shadow: 0 0 30px rgba(100, 100, 255, 0.3);
        }
        h2 { color: #fff; margin-bottom: 20px; text-shadow: 0 0 10px #4a90e2; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; }
        button { width: 100%; padding: 12px; background: linear-gradient(90deg, #4a90e2, #9013fe); border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
        #passDisplay { margin-top: 20px; font-size: 1.2em; color: #4a90e2; font-weight: bold; }
    </style>
</head>
<body>

    <div class="stars" id="starContainer"></div>

    <div class="box">
        <h2>Galactic Security</h2>
        <input type="text" id="name" placeholder="Enter Name">
        <input type="text" id="bday" placeholder="Enter Birth Year (e.g., 1999)">
        <button onclick="generateSecurePassword()">Generate Key</button>
        <div id="passDisplay"></div>
    </div>

    <script>
        // Generating random stars
        const container = document.getElementById('starContainer');
        for(let i=0; i<100; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random()*3 + 'px';
            s.style.top = Math.random()*100 + '%';
            s.style.left = Math.random()*100 + '%';
            s.style.animationDelay = Math.random()*2 + 's';
            container.appendChild(s);
        }

        function generateSecurePassword() {
            const name = document.getElementById('name').value.substring(0, 3).toUpperCase();
            const bday = document.getElementById('bday').value.substring(2);
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%";
            let password = name + "-" + bday + "-";
            for(let i=0; i<8; i++) password += chars[Math.floor(Math.random() * chars.length)];
            document.getElementById('passDisplay').innerText = password;
        }
    </script>
</body>
</html>
