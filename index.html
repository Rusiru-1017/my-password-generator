<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Animated Password Generator</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            overflow: hidden; 
        }

        .box { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            text-align: center; 
            width: 320px; 
            z-index: 10;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 12px; 
            font-size: 20px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            text-align: center; 
            margin-bottom: 20px; 
            box-sizing: border-box;
            background-color: #f9f9f9;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            font-size: 16px; 
            background: #764ba2; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        button:hover { background: #5a377d; }

        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: animate 15s linear infinite;
            bottom: -150px;
        }
        .circle:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circle:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circle:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circle:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circle:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .circle:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .circle:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .circle:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .circle:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .circle:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }
    </style>
</head>
<body>

    <div class="background-animation">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="box">
        <h2>Password Generator</h2>
        <input type="text" id="passDisplay" readonly placeholder="Click button below">
        <button onclick="generatePassword()">Generate Password</button>
    </div>

    <script>
        function generatePassword() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
            let password = "";
            for(let i = 0; i < 12; i++) {
                let randomIndex = Math.floor(Math.random() * chars.length);
                password += chars[randomIndex];
            }
            document.getElementById("passDisplay").value = password;
        }
    </script>

</body>
</html>
