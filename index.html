<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galactic Security Key Generator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Neon Canvas Background */
    #neonCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .app-container {
      display: flex;
      width: 100vw;
      height: 100vh;
      position: relative;
      z-index: 10;
    }

    /* Left Side - Astronaut */
    .astronaut-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .astronaut-wrapper {
      position: relative;
      width: 450px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatAstronaut 8s ease-in-out infinite;
    }

    /* Neon glow behind astronaut to blend it */
    .astronaut-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(188, 19, 254, 0.4) 0%, rgba(0, 243, 255, 0.2) 40%, transparent 70%);
      border-radius: 50%;
      filter: blur(40px);
      z-index: -1;
      animation: pulseGlow 4s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.2); opacity: 1; }
    }

    .astronaut-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* Fade bottom to blend with black background */
      mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
      filter: drop-shadow(0 0 20px rgba(188, 19, 254, 0.6));
    }

    @keyframes floatAstronaut {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-20px) rotate(1deg); }
    }

    /* Right Side - Form */
    .form-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .content-card {
      background: rgba(10, 10, 20, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(188, 19, 254, 0.3);
      border-radius: 24px;
      padding: 50px 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 
        0 0 50px rgba(188, 19, 254, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: slideIn 1s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .title {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00f3ff 0%, #bc13fe 50%, #ff0055 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      margin-bottom: 40px;
      letter-spacing: 1px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      color: #00f3ff;
      font-size: 12px;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #bc13fe;
      box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
      background: rgba(0, 0, 0, 0.8);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #bc13fe 0%, #00f3ff 100%);
      border: none;
      border-radius: 12px;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(188, 19, 254, 0.5);
    }

    .result-section {
      margin-top: 30px;
      padding: 25px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 243, 255, 0.4);
      border-radius: 16px;
      display: none;
    }

    .result-label {
      color: #00f3ff;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 15px;
      font-weight: 700;
      text-align: center;
    }

    .security-key {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(0, 243, 255, 0.5);
      padding: 18px;
      border-radius: 10px;
      color: #00f3ff;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 2px;
      user-select: all;
      text-shadow: 0 0 10px rgba(0, 243, 255, 0.8);
      word-break: break-all;
    }

    .copy-btn {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: rgba(188, 19, 254, 0.1);
      border: 1px solid rgba(188, 19, 254, 0.4);
      color: #bc13fe;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      background: rgba(188, 19, 254, 0.3);
      box-shadow: 0 0 15px rgba(188, 19, 254, 0.4);
    }

    /* Mobile Responsive */
    @media (max-width: 900px) {
      .app-container {
        flex-direction: column;
        overflow-y: auto;
      }
      .astronaut-side {
        flex: 0 0 300px;
      }
      .astronaut-wrapper {
        width: 250px;
        height: 350px;
      }
      .form-side {
        flex: 1;
        padding: 20px;
      }
      .content-card {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

<canvas id="neonCanvas"></canvas>

<div class="app-container">
  <!-- Left Side: Realistic Astronaut -->
  <div class="astronaut-side">
    <div class="astronaut-wrapper">
      <div class="astronaut-glow"></div>
      <!-- Using a highly reliable realistic astronaut image -->
      <img src="https://images.unsplash.com/photo-1614728263952-84ea256f9679?auto=format&fit=crop&w=600&q=80" 
           alt="Realistic Astronaut" 
           class="astronaut-img"
           onerror="this.src='https://images.unsplash.com/photo-1541873676-a18131494184?auto=format&fit=crop&w=600&q=80'">
    </div>
  </div>

  <!-- Right Side: Form -->
  <div class="form-side">
    <div class="content-card">
      <h1 class="title">Galactic Security Key</h1>
      <p class="subtitle">Generate your unique cosmic key</p>
      
      <form id="keyForm">
        <div class="form-group">
          <label for="name">Enter your name</label>
          <input type="text" id="name" placeholder="Your name" required>
        </div>
        
        <div class="form-group">
          <label for="birthYear">Enter birth year</label>
          <input type="number" id="birthYear" placeholder="e.g. 1995" min="1900" max="2025" required>
        </div>
        
        <button type="submit" class="button">Generate Secure Key</button>
        
        <div class="result-section" id="resultSection">
          <div class="result-label">Your Security Key</div>
          <div class="security-key" id="securityKey">-</div>
          <button type="button" class="copy-btn" id="copyBtn">Copy to Clipboard</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
// ============================================
// NEON STARS ANIMATION (Blue, Purple, Pink)
// ============================================
const canvas = document.getElementById('neonCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const neonColors = ['#00f3ff', '#bc13fe', '#ff0055'];

class NeonStar {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2.5 + 0.5;
    this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
    this.opacity = Math.random() * 0.8 + 0.2;
    this.twinkleSpeed = Math.random() * 0.02 + 0.005;
    this.driftX = (Math.random() - 0.5) * 0.2;
    this.driftY = (Math.random() - 0.5) * 0.2;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.shadowBlur = 15;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  update() {
    this.opacity += this.twinkleSpeed;
    if (this.opacity > 1 || this.opacity < 0.1) {
      this.twinkleSpeed *= -1;
    }
    this.x += this.driftX;
    this.y += this.driftY;

    // Wrap around screen
    if (this.x < 0) this.x = canvas.width;
    if (this.x > canvas.width) this.x = 0;
    if (this.y < 0) this.y = canvas.height;
    if (this.y > canvas.height) this.y = 0;
  }
}

const stars = Array(150).fill().map(() => new NeonStar());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(star => {
    star.update();
    star.draw();
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ============================================
// PASSWORD GENERATOR LOGIC (UNCHANGED)
// ============================================
function generateSecurityKey(name, birthYear) {
  let hash = 0;
  const str = name + birthYear;

  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }

  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*_-+=';
  let key = '';
  let temp = Math.abs(hash);

  for (let i = 0; i < 20; i++) {
    key += chars[temp % chars.length];
    temp = Math.floor(temp / chars.length);
  }
  return key;
}

const keyForm = document.getElementById('keyForm');
const nameInput = document.getElementById('name');
const birthYearInput = document.getElementById('birthYear');
const securityKeyDisplay = document.getElementById('securityKey');
const resultSection = document.getElementById('resultSection');
const copyBtn = document.getElementById('copyBtn');

keyForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const name = nameInput.value.trim();
  const birthYear = birthYearInput.value;

  if (!name || !birthYear) {
    alert('Please fill in all fields');
    return;
  }

  const key = generateSecurityKey(name, birthYear);
  securityKeyDisplay.textContent = key;
  resultSection.style.display = 'block';
});

copyBtn.addEventListener('click', () => {
  const key = securityKeyDisplay.textContent;
  navigator.clipboard.writeText(key).then(() => {
    const originalText = copyBtn.textContent;
    copyBtn.textContent = 'Copied! ✓';
    setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
  });
});
</script>

</body>
</html>
