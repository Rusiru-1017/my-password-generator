<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Password Generator</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif;
            overflow: hidden;
        }

        /* Space animation */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
        }

        .shooting-star {
            position: absolute;
            width: 2px; height: 2px;
            background: white;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) translateX(0); opacity: 1; }
            100% { transform: translateY(100vh) translateX(200px); opacity: 0; }
        }

        .box { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            width: 320px; 
            border: 1px solid rgba(255,255,255,0.2);
        }
        h2 { color: white; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; text-align: center; border-radius: 10px; border: none; }
        button { width: 100%; padding: 12px; background: #ffcc00; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="shooting-star" style="left: 10%;"></div>
    <div class="shooting-star" style="left: 50%; animation-delay: 1s;"></div>
    <div class="shooting-star" style="left: 80%; animation-delay: 2s;"></div>

    <div class="box">
        <h2>Space Generator</h2>
        <input type="text" id="passDisplay" readonly placeholder="Click to generate">
        <button onclick="generatePassword()">Generate Password</button>
    </div>

    <script>
        function generatePassword() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
            let password = "";
            for(let i = 0; i < 12; i++) {
                password += chars[Math.floor(Math.random() * chars.length)];
            }
            document.getElementById("passDisplay").value = password;
        }
    </script>
</body>
</html>
