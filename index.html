<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galactic Security Key Generator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #galaxyCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 1;
      animation: nebulaPulse 8s ease-in-out infinite;
    }

    .nebula-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(188, 19, 254, 0.5) 0%, transparent 70%);
      top: -200px;
      right: -100px;
    }

    .nebula-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0, 243, 255, 0.4) 0%, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation-delay: -3s;
    }

    .nebula-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 0, 85, 0.3) 0%, transparent 70%);
      top: 40%;
      left: 30%;
      animation-delay: -6s;
    }

    @keyframes nebulaPulse {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.2); opacity: 0.6; }
    }

    .app-container {
      display: flex;
      width: 100vw;
      height: 100vh;
      position: relative;
      z-index: 10;
    }

    .astronaut-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .astronaut-wrapper {
      position: relative;
      width: 450px;
      height: 700px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatAstronaut 10s ease-in-out infinite;
    }

    .neon-ring {
      position: absolute;
      border: 3px solid rgba(188, 19, 254, 0.6);
      border-radius: 50%;
      animation: ringRotate 10s linear infinite;
      box-shadow: 
        0 0 40px rgba(188, 19, 254, 0.8),
        inset 0 0 40px rgba(0, 243, 255, 0.4);
    }

    .neon-ring:nth-child(1) {
      width: 400px;
      height: 400px;
      animation-delay: 0s;
    }

    .neon-ring:nth-child(2) {
      width: 450px;
      height: 450px;
      border-color: rgba(0, 243, 255, 0.5);
      animation-delay: -3s;
      animation-direction: reverse;
      box-shadow: 
        0 0 50px rgba(0, 243, 255, 0.7),
        inset 0 0 50px rgba(188, 19, 254, 0.3);
    }

    .neon-ring:nth-child(3) {
      width: 500px;
      height: 500px;
      border-color: rgba(255, 0, 85, 0.4);
      animation-delay: -6s;
      box-shadow: 
        0 0 60px rgba(255, 0, 85, 0.6),
        inset 0 0 60px rgba(0, 243, 255, 0.2);
    }

    @keyframes ringRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .astronaut-img {
      width: 90%;
      height: 90%;
      object-fit: contain;
      filter: 
        brightness(1.3) 
        contrast(1.2)
        drop-shadow(0 0 40px rgba(188, 19, 254, 1))
        drop-shadow(0 0 80px rgba(0, 243, 255, 0.8));
      animation: astronautGlow 4s ease-in-out infinite alternate;
      z-index: 10;
    }

    @keyframes astronautGlow {
      0% { filter: brightness(1.3) contrast(1.2) drop-shadow(0 0 30px rgba(188, 19, 254, 0.9)); }
      100% { filter: brightness(1.4) contrast(1.25) drop-shadow(0 0 70px rgba(0, 243, 255, 1)); }
    }

    @keyframes floatAstronaut {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      25% { transform: translateY(-30px) rotate(0deg); }
      50% { transform: translateY(0) rotate(2deg); }
      75% { transform: translateY(-20px) rotate(0deg); }
    }

    .form-side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .content-card {
      background: rgba(10, 10, 20, 0.7);
      backdrop-filter: blur(30px);
      border: 2px solid rgba(188, 19, 254, 0.5);
      border-radius: 30px;
      padding: 50px 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 0 60px rgba(188, 19, 254, 0.3);
      animation: slideIn 1s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .title {
      text-align: center;
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00f3ff 0%, #bc13fe 50%, #ff0055 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      color: #00f3ff;
      font-size: 12px;
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #bc13fe;
      box-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
      background: rgba(0, 0, 0, 0.9);
    }

    .button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #bc13fe 0%, #00f3ff 100%);
      border: none;
      border-radius: 12px;
      color: #000;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(188, 19, 254, 0.8);
    }

    .result-section {
      margin-top: 30px;
      padding: 25px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid rgba(0, 243, 255, 0.6);
      border-radius: 16px;
      display: none;
    }

    .result-label {
      color: #00f3ff;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 15px;
      font-weight: 700;
      text-align: center;
    }

    .security-key {
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid rgba(0, 243, 255, 0.7);
      padding: 18px;
      border-radius: 10px;
      color: #00f3ff;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 2px;
      word-break: break-all;
    }

    .copy-btn {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background: rgba(188, 19, 254, 0.2);
      border: 2px solid rgba(188, 19, 254, 0.6);
      color: #bc13fe;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      background: rgba(188, 19, 254, 0.4);
      box-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
    }

    @media (max-width: 900px) {
      .app-container {
        flex-direction: column;
        overflow-y: auto;
      }
      .astronaut-side {
        flex: 0 0 400px;
      }
      .astronaut-wrapper {
        width: 300px;
        height: 450px;
      }
      .form-side {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

<canvas id="galaxyCanvas"></canvas>

<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div class="app-container">
  <div class="astronaut-side">
    <div class="astronaut-wrapper">
      <div class="neon-ring"></div>
      <div class="neon-ring"></div>
      <div class="neon-ring"></div>
      <!-- BETTER ASTRONAUT IMAGE - Transparent PNG -->
      <img src="https://purepng.com/public/uploads/large/purepng.com-astronautastronautspace-suitnaspacewalk-901524653835r6dqm.png" 
           alt="Astronaut" 
           class="astronaut-img"
           onerror="this.src='https://www.pngarts.com/files/3/Astronaut-Space-Suit-PNG-Image.png'">
    </div>
  </div>

  <div class="form-side">
    <div class="content-card">
      <h1 class="title">Galactic Security Key</h1>
      <p class="subtitle">Generate your unique cosmic key</p>
      
      <form id="keyForm">
        <div class="form-group">
          <label for="name">Enter your name</label>
          <input type="text" id="name" placeholder="Your name" required>
        </div>
        
        <div class="form-group">
          <label for="birthYear">Enter birth year</label>
          <input type="number" id="birthYear" placeholder="e.g. 1995" min="1900" max="2025" required>
        </div>
        
        <button type="submit" class="button">Generate Secure Key</button>
        
        <div class="result-section" id="resultSection">
          <div class="result-label">Your Security Key</div>
          <div class="security-key" id="securityKey">-</div>
          <button type="button" class="copy-btn" id="copyBtn">Copy to Clipboard</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('galaxyCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const neonColors = ['#00f3ff', '#bc13fe', '#ff0055', '#ffffff'];

class NeonStar {
  constructor() {
    this.reset();
    this.y = Math.random() * canvas.height;
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = -10;
    this.z = Math.random() * 3 + 0.5;
    this.size = Math.random() * 3 + 0.5;
    this.speed = Math.random() * 1 + 0.3;
    this.opacity = Math.random() * 0.8 + 0.2;
    this.twinkleSpeed = Math.random() * 0.03 + 0.01;
    this.color = neonColors[Math.floor(Math.random() * neonColors.length)];
    this.pulsePhase = Math.random() * Math.PI * 2;
  }

  draw() {
    const pulseSize = this.size * (1 + Math.sin(this.pulsePhase) * 0.3);
    
    const gradient = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, pulseSize * 4
    );
    gradient.addColorStop(0, `rgba(${this.hexToRgb(this.color)}, ${this.opacity * 0.8})`);
    gradient.addColorStop(0.5, `rgba(${this.hexToRgb(this.color)}, ${this.opacity * 0.3})`);
    gradient.addColorStop(1, `rgba(${this.hexToRgb(this.color)}, 0)`);
    
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(this.x, this.y, pulseSize * 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.shadowBlur = 20;
    ctx.shadowColor = this.color;
    ctx.fillStyle = `rgba(${this.hexToRgb(this.color)}, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, pulseSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? 
      `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : 
      '255, 255, 255';
  }

  update() {
    this.y += this.speed * this.z;
    this.opacity += this.twinkleSpeed;
    this.pulsePhase += 0.05;

    if (this.opacity > 1 || this.opacity < 0.1) {
      this.twinkleSpeed *= -1;
    }

    if (this.y > canvas.height) {
      this.reset();
    }
  }
}

const stars = Array(300).fill().map(() => new NeonStar());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(star => {
    star.update();
    star.draw();
  });
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

function generateSecurityKey(name, birthYear) {
  let hash = 0;
  const str = name + birthYear;

  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }

  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*_-+=';
  let key = '';
  let temp = Math.abs(hash);

  for (let i = 0; i < 20; i++) {
    key += chars[temp % chars.length];
    temp = Math.floor(temp / chars.length);
  }
  return key;
}

const keyForm = document.getElementById('keyForm');
const nameInput = document.getElementById('name');
const birthYearInput = document.getElementById('birthYear');
const securityKeyDisplay = document.getElementById('securityKey');
const resultSection = document.getElementById('resultSection');
const copyBtn = document.getElementById('copyBtn');

keyForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const name = nameInput.value.trim();
  const birthYear = birthYearInput.value;

  if (!name || !birthYear) {
    alert('Please fill in all fields');
    return;
  }

  const key = generateSecurityKey(name, birthYear);
  securityKeyDisplay.textContent = key;
  resultSection.style.display = 'block';
});

copyBtn.addEventListener('click', () => {
  const key = securityKeyDisplay.textContent;
  navigator.clipboard.writeText(key).then(() => {
    const originalText = copyBtn.textContent;
    copyBtn.textContent = 'Copied! ✓';
    setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
  });
});
</script>

</body>
</html>
