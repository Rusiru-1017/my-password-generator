<!DOCTYPE html>
<html>
<head>
  <title>Password Generator</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f4; }
    .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
    input { padding: 10px; font-size: 18px; width: 250px; text-align: center; border: 1px solid #ccc; border-radius: 5px; }
    button { padding: 10px 20px; font-size: 16px; background: #2ea44f; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    button:hover { background: #2c974b; }
  </style>
</head>
<body>

  <div class="box">
    <h2>Random Password Generator</h2>
    <input type="text" id="passDisplay" readonly placeholder="Click the button below">
    <br>
    <button onclick="generatePassword()">Generate Password</button>
  </div>

  <script>
    function generatePassword() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()";
      let password = "";
      for(let i = 0; i < 12; i++) {
        let randomIndex = Math.floor(Math.random() * chars.length);
        password += chars[randomIndex];
      }
      document.getElementById("passDisplay").value = password;
    }
  </script>

</body>
</html>
