<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galactic Security Key Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow-x: hidden;
      background: linear-gradient(to bottom, #0a0e27, #1a1f4b);
      min-height: 100vh;
    }

    /* Space Background Canvas */
    #spaceCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Subtle Nebula */
    .nebula {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      z-index: 1;
      pointer-events: none;
    }

    .nebula-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(188, 19, 254, 0.4) 0%, transparent 70%);
      top: -200px;
      right: -150px;
      animation: float 20s ease-in-out infinite;
    }

    .nebula-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 243, 255, 0.3) 0%, transparent 70%);
      bottom: -150px;
      left: -100px;
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Light Glass Card */
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 35px;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00f3ff, #bc13fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      margin-bottom: 35px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #00f3ff;
      font-size: 11px;
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #bc13fe;
      box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
      background: rgba(0, 0, 0, 0.6);
    }

    .button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #bc13fe, #00f3ff);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(188, 19, 254, 0.4);
    }

    .result-section {
      margin-top: 25px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 243, 255, 0.4);
      border-radius: 12px;
      display: none;
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-label {
      color: #00f3ff;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      font-weight: 700;
      text-align: center;
    }

    .security-key {
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(0, 243, 255, 0.5);
      padding: 15px;
      border-radius: 8px;
      color: #00f3ff;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      text-align: center;
      font-weight: bold;
      letter-spacing: 1px;
      word-break: break-all;
    }

    .copy-btn {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: rgba(188, 19, 254, 0.2);
      border: 1px solid rgba(188, 19, 254, 0.4);
      color: #bc13fe;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      background: rgba(188, 19, 254, 0.3);
      box-shadow: 0 0 15px rgba(188, 19, 254, 0.3);
    }

    @media (max-width: 600px) {
      .card {
        padding: 35px 25px;
      }
      .title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<canvas id="spaceCanvas"></canvas>

<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<div class="container">
  <div class="card">
    <h1 class="title">🚀 Galactic Security Key</h1>
    <p class="subtitle">Generate your unique cosmic key</p>
    
    <form id="keyForm">
      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>
      
      <div class="form-group">
        <label for="birthDate">Date of Birth</label>
        <input type="date" id="birthDate" required>
      </div>
      
      <button type="submit" class="button">Generate Secure Key</button>
      
      <div class="result-section" id="resultSection">
        <div class="result-label">Your Security Key</div>
        <div class="security-key" id="securityKey">-</div>
        <button type="button" class="copy-btn" id="copyBtn">Copy to Clipboard</button>
      </div>
    </form>
  </div>
</div>

<script>
// ============================================
// SUBTLE STAR ANIMATION (Small falling stars)
// ============================================
const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const starColors = ['#00f3ff', '#bc13fe', '#ffffff', '#ffd700'];

class Star {
  constructor() {
    this.reset();
    this.y = Math.random() * canvas.height;
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = -5;
    this.size = Math.random() * 1.5 + 0.3; // Very small stars
    this.speed = Math.random() * 0.8 + 0.2; // Slow falling
    this.opacity = Math.random() * 0.6 + 0.2;
    this.twinkleSpeed = Math.random() * 0.02 + 0.005;
    this.color = starColors[Math.floor(Math.random() * starColors.length)];
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.shadowBlur = 8;
    ctx.shadowColor = this.color;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  update() {
    this.y += this.speed;
    this.opacity += this.twinkleSpeed;

    if (this.opacity > 0.8 || this.opacity < 0.1) {
      this.twinkleSpeed *= -1;
    }

    if (this.y > canvas.height) {
      this.reset();
    }
  }
}

// Create 200 small subtle stars
const stars = Array(200).fill().map(() => new Star());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  stars.forEach(star => {
    star.update();
    star.draw();
  });
  
  requestAnimationFrame(animate);
}

animate();

// ============================================
// PASSWORD GENERATOR
// ============================================
function generateSecurityKey(name, birthDate) {
  let hash = 0;
  const str = name.toLowerCase() + birthDate;

  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }

  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%^&*';
  let key = '';
  let temp = Math.abs(hash);

  for (let i = 0; i < 20; i++) {
    key += chars[temp % chars.length];
    temp = Math.floor(temp / chars.length);
  }
  
  // Format: XXXX-XXXX-XXXX-XXXX
  return key.match(/.{1,4}/g).join('-');
}

// Form handling
const keyForm = document.getElementById('keyForm');
const nameInput = document.getElementById('name');
const birthDateInput = document.getElementById('birthDate');
const securityKeyDisplay = document.getElementById('securityKey');
const resultSection = document.getElementById('resultSection');
const copyBtn = document.getElementById('copyBtn');

keyForm.addEventListener('submit', (e) => {
  e.preventDefault();
  const name = nameInput.value.trim();
  const birthDate = birthDateInput.value;

  if (!name || !birthDate) {
    alert('Please fill in all fields');
    return;
  }

  const key = generateSecurityKey(name, birthDate);
  securityKeyDisplay.textContent = key;
  resultSection.style.display = 'block';
});

copyBtn.addEventListener('click', () => {
  const key = securityKeyDisplay.textContent;
  navigator.clipboard.writeText(key).then(() => {
    const originalText = copyBtn.textContent;
    copyBtn.textContent = 'Copied! ✓';
    setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
  });
});
</script>

</body>
</html>
